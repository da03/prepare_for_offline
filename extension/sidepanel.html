<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prepare for Offline</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        color: #0f172a;
        background: #f8fafc;
        font-size: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #64748b;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #0f172a;
        color: #fff;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      button.secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
      #status {
        font-size: 13px;
        margin-top: 8px;
      }
      .ok {
        color: #047857;
      }
      .err {
        color: #b91c1c;
      }
      .muted {
        color: #64748b;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Add page to offline pack</h1>

    <div class="card">
      <button id="save">Save this page</button>
      <div id="status" class="muted">Ready.</div>
    </div>

    <div class="card">
      <label for="base">Local app address</label>
      <input id="base" value="http://127.0.0.1:8765" />
      <label for="token" style="margin-top: 10px">
        App token (copy from the app's Packs tab)
      </label>
      <input id="token" type="password" placeholder="paste token" />
      <button id="pair" class="secondary">Save connection</button>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>

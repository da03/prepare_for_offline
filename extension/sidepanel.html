<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prepare for Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3f5f8;
        --surface: #ffffff;
        --text: #15181d;
        --muted: #59616d;
        --border: #d7dce3;
        --accent: #155eef;
        --accent-text: #ffffff;
        --secondary: #edf0f4;
        --success: #176b43;
        --danger: #b42318;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111318;
          --surface: #191c22;
          --text: #f2f4f7;
          --muted: #b5bdc9;
          --border: #353b45;
          --accent: #6f98ff;
          --accent-text: #0e1830;
          --secondary: #292e37;
          --success: #65d39a;
          --danger: #ff9187;
        }
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        color: var(--text);
        background: var(--bg);
        font-size: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand img {
        width: 24px;
        height: 24px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
        background: var(--surface);
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: var(--accent-text);
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      button.secondary {
        background: var(--secondary);
        color: var(--text);
      }
      :focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      #status {
        font-size: 13px;
        margin-top: 8px;
      }
      .ok {
        color: var(--success);
      }
      .err {
        color: var(--danger);
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1 class="brand">
      <img src="icons/icon-32.png" alt="" />
      <span>Save page for offline</span>
    </h1>

    <div class="card">
      <label for="context">Save to context</label>
      <select id="context" disabled>
        <option>Connect to the app first</option>
      </select>
      <button id="save">Save this page</button>
      <div id="status" class="muted">Ready.</div>
    </div>

    <div class="card">
      <label for="base">Local app address</label>
      <input id="base" value="http://127.0.0.1:8765" />
      <label for="token" style="margin-top: 10px">
        App token (Settings → Advanced)
      </label>
      <input id="token" type="password" placeholder="paste token" />
      <button id="pair" class="secondary">Connect</button>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>

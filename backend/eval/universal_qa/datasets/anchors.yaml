      },
      "references": ["nasa-seasons"],
      "freshness": {
        "classification": "stable",
        "as_of": "2026-07-17",
        "expectation": "Explain axial tilt and hemispheric opposition."
      },
      "rubric": {
        "must_include": [
          {
            "id": "anchor-earth-seasons.m1",
            "claim": "Attributes seasons primarily to Earth’s roughly 23.5-degree axial tilt.",
            "weight": 0.45,
            "aliases": ["23.5 degree axial tilt", "Earth's axial tilt", "tilted axis"],
            "rationale": "Axial tilt is the governing mechanism.",
            "accepted_evidence": ["Names axial tilt, with or without the approximate angle."],
            "references": ["nasa-seasons"]
          },
          {
            "id": "anchor-earth-seasons.m2",
            "claim": "Explains that a hemisphere tilted toward the Sun receives more direct sunlight and longer days.",
            "weight": 0.35,
            "aliases": [{"all": ["more direct sunlight", "longer days"]}, "higher sun angle and longer daylight"],
            "rationale": "The mechanism should connect tilt to surface heating.",
            "accepted_evidence": ["Mentions both light angle or concentration and day length."],
            "references": ["nasa-seasons"]
          }
        ],
        "should_include": [
          {
            "id": "anchor-earth-seasons.s1",
            "claim": "Notes that opposite hemispheres have opposite seasons, which distance alone could not explain.",
            "weight": 0.2,
            "aliases": ["opposite hemispheres have opposite seasons", "summer in one hemisphere and winter in the other"],
            "rationale": "The hemispheric contrast is an intuitive falsification of the distance misconception.",
            "accepted_evidence": ["Uses Northern and Southern Hemisphere season opposition as evidence."],
            "references": ["nasa-seasons"]
          }
        ],
        "must_not_include": [
          {
            "id": "anchor-earth-seasons.n1",
            "claim": "Says Earth-Sun distance is the primary cause of ordinary seasons.",
            "penalty": 0.85,
            "aliases": ["closer to the Sun causes summer", "distance from the Sun causes the seasons", "farther away causes winter"],
            "rationale": "Earth is actually near perihelion during Northern Hemisphere winter; distance does not explain opposite seasons.",
            "accepted_evidence": ["Penalize presenting orbital distance as the main seasonal mechanism."],
            "references": ["nasa-seasons"]
          }
        ]
      },
      "follow_ups": [],
      "acceptable_aliases": {
        "axial tilt": ["tilted axis", "obliquity"],
        "direct sunlight": ["higher Sun angle", "more concentrated sunlight"]
      },
      "style": {
        "tone": "Clear and misconception-focused.",
        "structure": "Answer no, give the tilt mechanism, then use hemispheres as a check.",
        "expectation": "Avoid unnecessary orbital detail unless it reinforces the correction.",
        "max_words": 130
      },
      "exemplar": "No. Seasons are driven mainly by Earth’s roughly 23.5° axial tilt. When a hemisphere tilts toward the Sun, sunlight arrives more directly and days are longer, so it warms; the other hemisphere gets lower-angle light and shorter days. That is why the hemispheres have opposite seasons at the same Earth-Sun distance."
    },

    {
      "id": "anchor-simida",
      "question": "I keep hearing “simida” in Korean. What does it mean?",
      "category": "language_phonetic",
      "domain": "language_phonetic",
      "language": "en",
      "answer_policy": {
        "must_answer": true,
        "allow_refusal": false,
        "rationale": "The phonetic spelling is common and sufficiently identifiable; uncertainty should be bounded rather than used to refuse."
      },
      "references": ["korean-nikl"],
      "freshness": {
        "classification": "stable",
        "as_of": "2026-07-17",
        "expectation": "Describe the enduring grammatical function and acknowledge romanization ambiguity."
      },
      "rubric": {
        "must_include": [
          {
            "id": "anchor-simida.m1",
            "claim": "Identifies “simida” as a hearing or spelling of the Korean formal sentence ending 습니다.",
            "weight": 0.25,
            "aliases": ["formal sentence ending", "습니다", "seumnida"],
            "rationale": "The central interpretation is a grammatical ending, not an independent lexical translation.",
            "accepted_evidence": ["Calls it the formal-final ending 습니다, commonly romanized seumnida or heard approximately as simida."],
            "references": ["korean-nikl"]
          },
          {
            "id": "anchor-simida.m2",
            "claim": "Explains that 습니다 and ㅂ니다 are conditioned variants attached according to the preceding stem.",
            "weight": 0.2,
            "aliases": [{"all": ["습니다", "ㅂ니다"]}, {"all": ["seumnida", "mnida"]}],
            "rationale": "Both written variants are needed to explain what the listener is actually hearing.",
            "accepted_evidence": ["Notes that 습니다 follows consonant-final stems while ㅂ니다 attaches to vowel-final stems, with normal Korean conjugation details."],
            "references": ["korean-nikl"]
          },
          {
            "id": "anchor-simida.m3",
            "claim": "States that the ending marks a formal, polite or deferential statement.",
            "weight": 0.2,
            "aliases": ["formal polite", "formal and polite", "deferential speech level", "polite formal statement"],
            "rationale": "A useful answer must explain communicative function, not merely reproduce Hangul.",
            "accepted_evidence": ["Describes the ending as formal-polite, deferential, or used in formal declarative speech."],
            "references": ["korean-nikl"]
          },
          {
            "id": "anchor-simida.m4",
            "claim": "Clarifies that it attaches to a verb or adjective stem and is not normally a standalone word.",
            "weight": 0.15,
            "aliases": ["not a standalone word", "not an independent word", "attaches to a verb stem", "grammatical ending attached"],
            "rationale": "This prevents the frequent category error of assigning it a dictionary meaning by itself.",
            "accepted_evidence": ["Says it is an ending on a predicate rather than an autonomous word."],
            "references": ["korean-nikl"]
          }
        ],
        "should_include": [
          {
            "id": "anchor-simida.s1",
            "claim": "Warns that “simida” is an approximate phonetic spelling and that romanization may appear as seumnida, seubnida, or mnida in a full form.",
            "weight": 0.15,
            "aliases": ["approximate phonetic spelling", "romanized seumnida", "romanization varies", "heard as simida"],
            "rationale": "The user's Latin spelling suppresses sounds and morpheme boundaries, so overclaiming exact spelling would mislead.",
            "accepted_evidence": ["Explicitly distinguishes what may be heard from a standard transliteration."],
            "references": ["korean-nikl"]
          },
          {
            "id": "anchor-simida.s2",
            "claim": "Gives a short full-form example such as 감사합니다 and explains that the whole expression, not the ending alone, conveys thanks.",
            "weight": 0.05,
            "aliases": ["감사합니다", "gamsahamnida", "whole expression"],
            "rationale": "An example resolves why travelers often associate the sound with thanking.",
            "accepted_evidence": ["Uses 감사합니다 while separating 감사하다 from the final ending."],
            "references": ["korean-nikl"]
          }
        ],
        "must_not_include": [
          {
            "id": "anchor-simida.n1",
            "claim": "Treats “simida” as a standalone Korean word whose meaning is “thank you.”",
            "penalty": 0.8,
            "aliases": ["simida means thank you", "word for thank you", "standalone word meaning thank you"],
            "rationale": "Thanking comes from the full expression 감사합니다; the ending itself supplies grammar and register.",
            "accepted_evidence": ["Penalize an unqualified one-to-one translation of simida as thank you."],
            "references": ["korean-nikl"]
          },
          {
            "id": "anchor-simida.n2",
            "claim": "Claims that “simida” is the exact standard romanization in every context.",
            "penalty": 0.35,
            "aliases": ["exact standard romanization", "always spelled simida"],
            "rationale": "The user's spelling is an auditory approximation and the surface ending varies.",
            "accepted_evidence": ["Penalize categorical claims that erase 습니다/ㅂ니다 and romanization variation."],
            "references": ["korean-nikl"]
          }
        ]
      },
      "follow_ups": [
        {
          "id": "anchor-simida-f1",
          "question": "Can you show how 습니다 and ㅂ니다 attach to two common verbs?",
          "purpose": "Tests whether the system can turn the grammatical explanation into bounded examples."
        }
      ],
      "acceptable_aliases": {
        "습니다": ["seumnida", "seubnida"],
        "ㅂ니다": ["mnida", "-ㅂ니다"],
        "formal polite": ["deferential", "formal-polite"]
      },
      "style": {
        "tone": "Friendly and corrective without mocking the phonetic spelling.",
        "structure": "Lead with the likely identification, then explain form, function, and one example.",
        "expectation": "State the likely interpretation confidently while preserving the romanization caveat.",
        "max_words": 180
      },
      "exemplar": "“Simida” is probably what you are hearing as 습니다 (often romanized seumnida), or its vowel-stem variant ㅂ니다. It is not a standalone word: it attaches to a verb or adjective stem to make a formal, polite/deferential statement. For example, 감사합니다 is the whole expression commonly translated as “thank you”; the ending alone does not mean “thank you.” The spelling “simida” is only an approximate rendering of the sound, so romanizations vary."
    },

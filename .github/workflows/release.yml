name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install backend build dependencies
        run: >-
          python -m pip install
          --extra-index-url https://pypi.programasweights.com/simple/
          pyinstaller
          -e "backend[dev]"
      - name: Install frontend and desktop dependencies
        run: |
          npm --prefix frontend ci
          npm --prefix desktop ci
      - name: Build and verify DMG
        run: bash scripts/build_release.sh
      - name: Create checksums
        run: |
          python3 - <<'PY'
          import glob, hashlib, pathlib
          for raw in glob.glob("desktop/src-tauri/target/*/release/bundle/dmg/*.dmg"):
              path = pathlib.Path(raw)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              path.with_suffix(".sha256").write_text(f"{digest}  {path.name}\n")
          PY
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/*/release/bundle/dmg/*.sha256

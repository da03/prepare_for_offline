name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install backend build dependencies
        run: >-
          python -m pip install
          --extra-index-url https://pypi.programasweights.com/simple/
          pyinstaller
          -e "backend[dev]"
      - name: Install frontend and desktop dependencies
        run: |
          npm --prefix frontend ci
          npm --prefix desktop ci
      - name: Build and verify DMG
        run: bash scripts/build_release.sh
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
